[project]
name = "xuanwu"
version = "0.1.0"
description = "A self-hosted authentication and authorization server built with FastAPI, MySQL, Redis, and Celery."
readme = "README.md"
requires-python = ">=3.12,<3.13"
license = { text = "MIT" }

# --- Runtime dependencies (the full intended stack; see STACK-MAPPING-CHEATSHEET) ---
# Declared up front so the image is stable across phases and the architecture is explicit.
# Exact pins live in requirements.lock (generated by `uv pip compile`).
dependencies = [
    # web  (fastapi>=0.138 pulls the patched starlette 1.3.1)
    "fastapi>=0.138,<0.139",
    "uvicorn[standard]>=0.32,<0.35",
    "pydantic>=2.9,<3",
    "pydantic-settings>=2.6,<3",
    "python-multipart>=0.0.12",
    "email-validator>=2.2",
    # db
    "sqlalchemy[asyncio]>=2.0.36,<2.1",
    "asyncmy>=0.2.9",
    "pymysql>=1.1",
    "alembic>=1.14,<2",
    # cache / broker / sessions
    "redis>=5.2,<6",
    "celery[redis]>=5.4,<6",
    # security / crypto
    "passlib[bcrypt]>=1.7.4",
    "bcrypt>=4.0.1,<4.1",
    "pyjwt[crypto]>=2.10,<3",
    "cryptography>=44.0",
    "pyotp>=2.9",
    "qrcode[pil]>=8.0",
    "zxcvbn>=4.4.28",
    "slowapi>=0.1.9",
    # email / sms / storage providers
    "aiosmtplib>=3.0",
    "sendgrid>=6.11",
    "jinja2>=3.1",
    "twilio>=9.3",
    "boto3>=1.35",
    # misc infra
    "structlog>=24.4",
    "pyyaml>=6.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.8,<0.9",
    "mypy>=1.13,<2",
    "bandit>=1.8,<2",
    "pip-audit>=2.7,<3",
    "pytest>=9.1,<10",
    "pytest-asyncio>=1.4,<2",
    "factory-boy>=3.3",
    "fakeredis>=2.26,<3",
    "types-pyyaml>=6.0",
    "types-passlib>=1.7",
]

# ----------------------------------------------------------------------------
# Tooling configuration (single source of truth; ruff/mypy/pytest/bandit read here)
# ----------------------------------------------------------------------------

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app", "tests"]
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "UP",       # pyupgrade
    "B",        # flake8-bugbear
    "C4",       # comprehensions
    "SIM",      # simplify
    "ASYNC",    # async correctness
    "S",        # bandit-style security lints
    "RUF",      # ruff-specific
]
ignore = []

[tool.ruff.lint.flake8-bugbear]
# FastAPI uses these as call expressions in argument defaults by design.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Form",
    "fastapi.File",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106"]       # asserts and dummy secrets are expected in tests
"app/core/config.py" = ["S105", "S106"]     # default values for settings fields, not real secrets
"app/services/auth_service.py" = ["S105"]   # token-type/title constants, not secrets

[tool.mypy]
python_version = "3.12"
strict = true
files = ["app", "tests"]
plugins = ["pydantic.mypy"]
warn_unused_configs = true
warn_unreachable = true

[[tool.mypy.overrides]]
module = [
    "zxcvbn", "qrcode", "pyotp", "fakeredis", "celery",
    "geoip2.*", "sendgrid", "sendgrid.*",
    "twilio.*", "boto3",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra"
filterwarnings = [
    # passlib imports the stdlib `crypt` module, deprecated upstream; not our code.
    "ignore:'crypt' is deprecated:DeprecationWarning",
]

[tool.bandit]
exclude_dirs = ["tests", "alembic"]
