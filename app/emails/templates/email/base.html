<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Rare Vintage{% endblock %}</title>
  </head>
  <body style="margin:0; padding:0; background-color:#fbf7ef;">
    <span style="display:none; max-height:0; overflow:hidden; opacity:0;">
      {% block preheader %}{% endblock %}
    </span>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
           style="background-color:#fbf7ef; padding:32px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0"
                 style="width:600px; max-width:92%; background-color:#ffffff;
                        border:1px solid #ece3d0; border-radius:6px;
                        font-family:Georgia,'Cormorant Garamond','Times New Roman',serif;
                        color:#2b2b2b;">
            <tr>
              <td style="padding:28px 40px; border-bottom:2px solid #b8923e; text-align:center;">
                <span style="font-size:26px; letter-spacing:3px; color:#b8923e;
                             text-transform:uppercase;">Rare Vintage</span>
              </td>
            </tr>
            <tr>
              <td style="padding:40px;">
                {% block content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:24px 40px; border-top:1px solid #ece3d0;
                         font-size:13px; line-height:20px; color:#8a8a82;">
                Rare Vintage &mdash; fine &amp; rare wine, Australia<br />
                Questions? Reply to this email or write to
                <a href="mailto:hello@rarevintage.com.au"
                   style="color:#b8923e;">hello@rarevintage.com.au</a>.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
