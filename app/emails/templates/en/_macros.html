{% macro heading(text) -%}
<h1 style="margin:0 0 18px; font-size:24px; font-weight:normal; color:#2b2b2b;">{{ text }}</h1>
{%- endmacro %}

{% macro paragraph(text) -%}
<p style="margin:0 0 18px; font-size:16px; line-height:26px; color:#3d3d3d;">{{ text }}</p>
{%- endmacro %}

{% macro button(label, url) -%}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:8px 0 24px;">
  <tr>
    <td style="background-color:#b8923e; border-radius:4px;">
      <a href="{{ url }}"
         style="display:inline-block; padding:13px 30px; font-size:16px;
                color:#ffffff; text-decoration:none; letter-spacing:1px;">{{ label }}</a>
    </td>
  </tr>
</table>
{%- endmacro %}

{% macro fineprint(text) -%}
<p style="margin:18px 0 0; font-size:13px; line-height:20px; color:#8a8a82;">{{ text }}</p>
{%- endmacro %}
