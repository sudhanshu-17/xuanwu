# Dev orchestration for the Xuanwu auth server: db, redis, mailhog (email
# catcher), minio (S3-compatible storage), the api, the Celery worker, and
# Celery beat (scheduler). One process per container. For production see
# docker-compose.prod.yml.
#
# Common commands (you never touch host Python — it all runs in containers):
#   docker compose build api
#   docker compose up                           # whole stack
#   docker compose up api                       # just the API → http://localhost:8000/health
#   docker compose run --rm --no-deps api ruff check .
#   docker compose run --rm --no-deps api mypy
#   docker compose run --rm api pytest -q

services:
  db:
    image: mysql:8
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: xuanwu
      MYSQL_USER: rv
      MYSQL_PASSWORD: rv
      MYSQL_ROOT_PASSWORD: rootrv
    # Host ports are configurable to avoid clashes with other local stacks
    # (containers talk to each other over the compose network as db:3306).
    ports: ["${DB_HOST_PORT:-3307}:3306"]
    volumes: ["mysqldata:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootrv"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports: ["${REDIS_HOST_PORT:-6380}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    # SMTP on 1025 (matches SMTP_PORT); web UI on 8025.
    ports: ["${MAILHOG_SMTP_PORT:-1025}:1025", "${MAILHOG_UI_PORT:-8025}:8025"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports: ["${MINIO_PORT:-9000}:9000", "${MINIO_CONSOLE_PORT:-9001}:9001"]
    volumes: ["miniodata:/data"]

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports: ["${API_HOST_PORT:-8000}:8000"]
    volumes: ["./:/app"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.workers.celery_app:celery_app worker -l info
    env_file: .env
    volumes: ["./:/app"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    # Scheduler: fires the periodic jobs in celery_app.beat_schedule
    # (daily token cleanup now; storage invoicing etc. in Phase 17).
    command: celery -A app.workers.celery_app:celery_app beat -l info
    env_file: .env
    volumes: ["./:/app"]
    depends_on:
      redis:
        condition: service_healthy

volumes:
  mysqldata: {}
  miniodata: {}
