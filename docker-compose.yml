# Dev orchestration for the Xuanwu auth server.
# Phase 0 needs only `api` to boot /health; db + redis are included now because
# Phase 1 wires them in immediately. Worker/beat/mailhog/minio land in later phases.
#
# Common commands (you never touch host Python — it all runs in containers):
#   docker compose build api
#   docker compose up api                       # http://localhost:8000/health
#   docker compose run --rm --no-deps api ruff check .
#   docker compose run --rm --no-deps api mypy
#   docker compose run --rm --no-deps api pytest -q

services:
  db:
    image: mysql:8
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: xuanwu
      MYSQL_USER: rv
      MYSQL_PASSWORD: rv
      MYSQL_ROOT_PASSWORD: rootrv
    ports: ["3306:3306"]
    volumes: ["mysqldata:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootrv"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports: ["8000:8000"]
    volumes: ["./:/app"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysqldata: {}
